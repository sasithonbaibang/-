<center><b><font face="TH kodchasal" size="5">ธงประจำจังหวัดนครราชสีมา มีลักษณะเป็นธงสี่เหลี่ยมผืนผ้า พื้นธงสีแสด (สีส้มแดง) <br>
  ตรงกลางเป็นตราประจำจังหวัด ซึ่งเป็นรูปอนุสาวรีย์ท้าวสุรนารี (ย่าโม) <br> ยืนถือดาบหันหน้าตรง ในซุ้มประตูชุมพล โดยเป็นสัญลักษณ์แสดงถึงวีรกรรมอันกล้าหาญของ <br>
  ท้าวสุรนารีในการกอบกู้เมืองนครราชสีมา
